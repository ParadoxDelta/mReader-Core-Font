name: Handheld Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: Linux-Abhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev git

    - name: Echte doc_api aus Quark-Sources holen
      run: |
        # Wir klonen das Quark-Repository in einen temporären Ordner
        git clone https://github.com/cobaltgit/Quark-Sources.git temp_quark
        
        # Wir löschen den kaputten/leeren Ordner in deinem Projekt
        rm -rf src/filetypes/doc_api
        rm -rf src/doc_api
        
        # Wir kopieren den echten, vollständigen doc_api-Ordner dorthin, wo dein Makefile ihn sucht
        cp -r temp_quark/pixel-reader/src/doc_api src/filetypes/doc_api

    - name: Kompilieren via Makefile
      run: |
        make
