name: Handheld Build (ARM64 Cross-Compile)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: ARM64 Paketquellen radikal bereinigen und Cross-Compiler installieren
      run: |
        # 1. ARM64 Architektur im System registrieren
        sudo dpkg --add-architecture arm64

        # 2. Alle alten, störenden Paketquellen-Konfigurationen restlos löschen
        sudo rm -f /etc/apt/sources.list
        sudo rm -rf /etc/apt/sources.list.d/*

        # 3. Eine komplett saubere, neue sources.list schreiben
        echo "deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        echo "deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        echo "deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu/ noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
        echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list

        # 4. Update ausführen
        sudo apt-get update
        
        # 5. Abhängigkeiten installieren
        sudo apt-get install -y build-essential gcc-aarch64-linux-gnu g++-aarch64-linux-gnu git \
          libglib2.0-dev-bin:amd64 libglib2.0-dev-bin-linux:amd64 \
          libxml2-dev:arm64 libzip-dev:arm64 libsdl1.2-dev:arm64 libsdl-ttf2.0-dev:arm64 libsdl-image1.2-dev:arm64 \
          libssl-dev:arm64

    - name: Echte doc_api aus Quark-Sources holen
      run: |
        git clone https://github.com/cobaltgit/Quark-Sources.git temp_quark
        rm -rf src/filetypes/doc_api src/doc_api
        mkdir -p src/filetypes/doc_api src/doc_api
        cp -r temp_quark/pixel-reader/src/doc_api/* src/filetypes/doc_api/
        cp -r temp_quark/pixel-reader/src/doc_api/* src/doc_api/

    - name: Code-Kompatibilität patchen (Präzise Text-Ersetzungen)
      run: |
        sed -i '1i#include <cstdint>' src/filetypes/doc_api/doc_addr.h
        sed -i '1i#include <cstdint>' src/doc_api/doc_addr.h
        sed -i '1i#include <cstdint>' src/filetypes/epub/xhtml_string_util.cpp
        sed -i '1i#include <cstdint>' src/reader/text_wrap.cpp
        sed -i '1i#include <cstdint>' src/util/string_serialization.cpp
        sed -i '1i#include <cstdint>' src/util/str_utils.cpp
        sed -i '1i#include <cstdint>' src/reader/shoulder_keymap.cpp
        
        find src/filetypes/doc_api/ src/doc_api/ -type f -exec sed -i 's/experimental::filesystem/filesystem/g' {} +
        find src/filetypes/doc_api/ src/doc_api/ -type f -exec sed -i 's/<experimental\/filesystem>/<filesystem>/g' {} +
        find src/filetypes/doc_api/ src/doc_api/ -type f -exec sed -i 's/experimental::optional/optional/g' {} +
        find src/filetypes/doc_api/ src/doc_api/ -type f -exec sed -i 's/<experimental\/optional>/<optional>/g' {} +

        sed -i '1i#include <optional>\n#include <cstdint>' src/reader/settings_store.h
        sed -i 's/int settings_get_font_size/std::optional<uint32_t> settings_get_font_size/g' src/reader/settings_store.h

        sed -i 's/surface_unique_ptr\s*{\s*zoomSurface/surface_unique_ptr(zoomSurface/g' src/reader/views/token_view/token_line_scroller.cpp
        sed -i '/surface_unique_ptr(zoomSurface/s/}/)/g' src/reader/views/token_view/token_line_scroller.cpp

    - name: Kompilieren via Makefile für ARM64
      run: |
        make -j CXX="aarch64-linux-gnu-g++" CC="aarch64-linux-gnu-gcc" \
          CXXFLAGS="-std=c++17 -O2 -Isrc -Isrc/doc_api -Isrc/filetypes -I/usr/include/libxml2 -I/usr/include/SDL -Wall -Wextra -Wno-error -w" \
          CFLAGS="-O2 -Wno-error -w"

    - name: Binary finden, strippen und Bibliotheken sammeln
      run: |
        # 1. Ausführbare Datei suchen
        FOUND_BIN=$(find . -maxdepth 3 -type f -executable ! -name "*.sh" ! -path "*/.*" | head -n 1)
        
        if [ -z "$FOUND_BIN" ]; then
          echo "FEHLER: Es wurde keine ausführbare Datei gebaut!"
          exit 1
        fi
        
        # 2. Ordner für den finalen Export vorbereiten
        mkdir -p dist/libs
        
        # 3. Binary optimieren und kopieren
        aarch64-linux-gnu-strip "$FOUND_BIN"
        cp "$FOUND_BIN" dist/reader
        
        # 4. Bibliotheken sammeln (Jetzt mit korrekt gesetztem Zielverzeichnis!)
        cp -L /usr/lib/aarch64-linux-gnu/libzip.so.4 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libxml2.so.2 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libcrypto.so.3 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libssl.so.3 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libstdc++.so.6 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libSDL-1.2.so.0 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libSDL_ttf-2.0.so.0 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libSDL_image-1.2.so.0 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libfreetype.so.6 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libpng16.so.16 dist/libs/ 2>/dev/null || true
        cp -L /usr/lib/aarch64-linux-gnu/libjpeg.so.8 dist/libs/ 2>/dev/null || true

        echo "Folgende Bibliotheken wurden erfolgreich exportiert:"
        ls -l dist/libs/

    - name: Fertige App und Libs hochladen
      uses: actions/upload-artifact@v4
      with:
        name: mreader-portmaster-package
        path: dist/
