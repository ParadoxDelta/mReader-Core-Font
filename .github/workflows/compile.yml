name: Handheld Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: Linux-Abhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev git

    - name: Echte doc_api aus Quark-Sources holen
      run: |
        git clone https://github.com/cobaltgit/Quark-Sources.git temp_quark
        rm -rf src/filetypes/doc_api
        cp -r temp_quark/pixel-reader/src/doc_api src/filetypes/doc_api

    - name: Kompilieren mit sauberer Namespace-Brücke
      run: |
        # Wir erstellen on-the-fly eine kleine Header-Datei, die die alten Typen auf moderne Typen umleitet
        echo '#include <cstdint>' > bridge.h
        echo '#include <filesystem>' >> bridge.h
        echo '#include <optional>' >> bridge.h
        echo 'namespace std { namespace experimental { namespace filesystem = std::filesystem; using std::optional; } }' >> bridge.h

        # Wir binden diese Brücke über "-include bridge.h" global ein
        make CXXFLAGS="-std=c++17 -g2 -Isrc -Isrc/filetypes -I/usr/include/libxml2 -pedantic-errors -Wall -Wextra -include bridge.h"
