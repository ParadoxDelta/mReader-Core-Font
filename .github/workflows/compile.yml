name: Handheld Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: Linux-Abhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev git

    - name: Fehlende doc_api manuell klonen
      run: |
        # Wir löschen den leeren Ordner und holen uns die echten Dateien direkt vom Entwickler
        rm -rf src/filetypes/doc_api
        git clone https://github.com/booYah187/doc_api.git src/filetypes/doc_api

    - name: Kompilieren via Makefile
      run: |
        make
