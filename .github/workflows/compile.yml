name: Handheld Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: Linux-Abhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev git

    - name: Echte doc_api aus Quark-Sources holen
      run: |
        git clone https://github.com/cobaltgit/Quark-Sources.git temp_quark
        rm -rf src/filetypes/doc_api
        cp -r temp_quark/pixel-reader/src/doc_api src/filetypes/doc_api

    - name: Kompilieren mit API-Kompatibilitäts-Flags
      run: |
        # -include cstdint fügt die fehlenden uint64_t Typen hinzu
        # -D... weicht das veraltete experimental::filesystem auf das moderne std::filesystem auf
        make CXXFLAGS="-std=c++17 -g2 -Isrc -Isrc/filetypes -I/usr/include/libxml2 -pedantic-errors -Wall -Wextra -include cstdint -Dexperimental= -D_GLIBCXX_EXPERIMENTAL_FILESYSTEM=1"
