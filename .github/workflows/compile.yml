name: Handheld Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: Linux-Abhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev git

    - name: Echte doc_api aus Quark-Sources holen
      run: |
        git clone https://github.com/cobaltgit/Quark-Sources.git temp_quark
        rm -rf src/filetypes/doc_api
        cp -r temp_quark/pixel-reader/src/doc_api src/filetypes/doc_api

    - name: Code-Kompatibilität patchen (Sed-Fix)
      run: |
        # 1. Wir fügen das fehlende <cstdint> in die doc_addr.h ein
        sed -i '1i#include <cstdint>' src/filetypes/doc_api/doc_addr.h
        
        # 2. Wir ersetzen das veraltete experimental::filesystem durch das moderne filesystem
        find src/filetypes/doc_api/ -type f -exec sed -i 's/experimental::filesystem/filesystem/g' {} +
        find src/filetypes/doc_api/ -type f -exec sed -i 's/<experimental\/filesystem>/<filesystem>/g' {} +

        # 3. Wir biegen das alte experimental::optional auf das normale std::optional um
        find src/filetypes/doc_api/ -type f -exec sed -i 's/experimental::optional/optional/g' {} +
        find src/filetypes/doc_api/ -type f -exec sed -i 's/<experimental\/optional>/<optional>/g' {} +

    - name: Kompilieren via Makefile mit Suchpfad
      run: |
        # WICHTIG: Wir übergeben CXXFLAGS, damit der Compiler den Ordner src/filetypes findet!
        make CXXFLAGS="-std=c++17 -g2 -Isrc -Isrc/filetypes -I/usr/include/libxml2 -pedantic-errors -Wall -Wextra"
