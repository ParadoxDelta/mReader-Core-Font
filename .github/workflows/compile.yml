name: Handheld Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Code herunterladen
      uses: actions/checkout@v4

    - name: Linux-Abhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libxml2-dev libzip-dev libsdl1.2-dev libsdl-ttf2.0-dev libsdl-image1.2-dev git

    - name: Echte doc_api aus Quark-Sources holen
      run: |
        git clone https://github.com/cobaltgit/Quark-Sources.git temp_quark
        rm -rf src/filetypes/doc_api
        cp -r temp_quark/pixel-reader/src/doc_api src/filetypes/doc_api

    - name: Code-Kompatibilität patchen (Letzter C++17-Schliff)
      run: |
        # 1. Wir fügen das fehlende <cstdint> in die doc_addr.h ein
        sed -i '1i#include <cstdint>' src/filetypes/doc_api/doc_addr.h
        
        # 2. Wir fügen das fehlende <cstdint> in die xhtml_string_util.cpp ein
        sed -i '1i#include <cstdint>' src/filetypes/epub/xhtml_string_util.cpp
        
        # 3. Wir ersetzen das veraltete experimental::filesystem durch das moderne filesystem
        find src/filetypes/doc_api/ -type f -exec sed -i 's/experimental::filesystem/filesystem/g' {} +
        find src/filetypes/doc_api/ -type f -exec sed -i 's/<experimental\/filesystem>/<filesystem>/g' {} +

        # 4. NEU: Wir fixen die Smart-Pointer-Initialisierung in token_line_scroller.cpp
        # Wir ändern geschweifte Klammern zu runden Klammern bei der surface_unique_ptr Erstellung
        sed -i 's/surface_unique_ptr\s*{\s*zoomSurface/surface_unique_ptr(zoomSurface/g' src/reader/views/token_view/token_line_scroller.cpp
        sed -i '/surface_unique_ptr(zoomSurface/s/}/)/g' src/reader/views/token_view/token_line_scroller.cpp

    - name: Kompilieren via Makefile mit Suchpfad
      run: |
        make -j CXXFLAGS="-std=c++17 -g2 -Isrc -Isrc/filetypes -I/usr/include/libxml2 -I/usr/include/SDL -Wall -Wextra -Dexperimental=std"

    - name: Fertige App hochladen (Download bereitstellen)
      uses: actions/upload-artifact@v4
      with:
        name: mreader-binar-datei
        path: |
          build/mreader
          mreader
          build/reader
          reader
        if-no-files-found: warn
